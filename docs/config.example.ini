# Sample config for cfd. Get tunnel_id / account_tag / secret from running
# `cloudflared tunnel create <name>` once on a normal machine and copying the
# generated <UUID>.json contents into the fields below.

tunnel_id         = 00000000-0000-0000-0000-000000000000
account_tag       = abcdef0123456789abcdef0123456789
tunnel_secret_b64 = REPLACE_ME

edge_host = region1.argotunnel.com
edge_port = 7844

tun_name  = cfd0
tun_local = 10.99.0.1/32

# CIDRs that WARP clients can reach through this host. Each must also be
# registered in the Zero Trust Dashboard:
#   cloudflared tunnel route ip add 10.99.0.0/24 <tunnel-id>
route = 10.99.0.0/24
route = 192.168.50.0/24
