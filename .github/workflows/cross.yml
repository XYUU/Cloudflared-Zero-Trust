# SPDX-License-Identifier: Apache-2.0
#
# Cross-compile sanity: we just need the binary to LINK for each target arch.
# Functional tests run on host CI; runtime smoke on real hardware is manual.
name: cross

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'cmake/toolchains/**'
      - 'CMakeLists.txt'
      - 'src/**'
      - 'include/**'
      - '.github/workflows/cross.yml'

jobs:
  cross:
    name: cross ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mipsel
            apt:    gcc-mipsel-linux-gnu g++-mipsel-linux-gnu
            prefix: mipsel-linux-gnu-
            toolchain: cmake/toolchains/mipsel-openwrt-musl.cmake
          - target: arm
            apt:    gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
            prefix: arm-linux-gnueabihf-
            toolchain: cmake/toolchains/arm-openwrt-musl.cmake
          - target: arm-eabi5
            apt:    ''
            musl_url: https://toolchains.bootlin.com/downloads/releases/toolchains/armv5-eabi/tarballs/armv5-eabi--musl--stable-2024.05-1.tar.xz
            prefix: arm-buildroot-linux-musleabi-
            toolchain: cmake/toolchains/arm-eabi5-openwrt-musl.cmake
          - target: linux-amd64
            apt:    ''
            prefix: ''
            toolchain: ''

    steps:
      - uses: actions/checkout@v4

      - name: install base build tools
        run: |
          sudo apt-get update
          # capnproto: host-side code generator (capnp compile runs on the host
          # even when cross-compiling; target libs come from CFD_FETCH_CAPNP).
          # msquic uses its bundled opensslquic submodule (QUIC_TLS=openssl,
          # QUIC_BUILD_TOOLS=OFF), so system libssl-dev and libnuma-dev are not needed.
          sudo apt-get install -y ninja-build cmake capnproto
          if [ -n "${{ matrix.apt }}" ]; then
            sudo apt-get install -y ${{ matrix.apt }}
          fi

      - name: cache musl cross toolchain
        if: matrix.musl_url != ''
        id: musl-cache
        uses: actions/cache@v4
        with:
          path: /opt/cross
          key: musl-${{ matrix.target }}-${{ hashFiles('.github/workflows/cross.yml') }}

      - name: fetch musl cross toolchain
        if: matrix.musl_url != '' && steps.musl-cache.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt/cross
          curl --retry 5 --retry-delay 5 --retry-all-errors -fSL \
            "${{ matrix.musl_url }}" -o /tmp/cross.tar
          sudo tar -xf /tmp/cross.tar -C /opt/cross --strip-components=1
          rm -f /tmp/cross.tar

      - name: export musl toolchain to PATH
        if: matrix.musl_url != ''
        run: echo "/opt/cross/bin" >> "$GITHUB_PATH"

      - name: configure
        run: |
          EXTRA=""
          if [ -n "${{ matrix.toolchain }}" ]; then
            EXTRA="-DCMAKE_TOOLCHAIN_FILE=${{ matrix.toolchain }} -DCFD_TOOLCHAIN_PREFIX=${{ matrix.prefix }}"
          fi
          cmake -B build-${{ matrix.target }} -G Ninja \
            $EXTRA \
            -DCFD_BUILD_TESTS=OFF \
            -DCFD_FETCH_MSQUIC=ON \
            -DCFD_FETCH_CAPNP=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: build
        run: cmake --build build-${{ matrix.target }} --target cfd cfd_probe -j

      - name: size report
        run: |
          ls -la build-${{ matrix.target }}/src/cfd
          PREFIX="${{ matrix.prefix }}"
          ${PREFIX}size build-${{ matrix.target }}/src/cfd || true

      - name: package
        run: |
          DIST=dist-${{ matrix.target }}
          BUILD=build-${{ matrix.target }}
          mkdir -p "${DIST}"
          cp "${BUILD}/src/cfd" "${BUILD}/src/cfd_probe" "${DIST}/"
          # libmsquic.so.2.4.5: deploy alongside the binary so the $ORIGIN RPATH resolves.
          SO="${BUILD}/_deps/msquic-build/bin/Release/libmsquic.so.2.4.5"
          if [ -f "${SO}" ]; then
            cp "${SO}" "${DIST}/"
          fi

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfd-${{ matrix.target }}-${{ github.sha }}
          path: dist-${{ matrix.target }}/
