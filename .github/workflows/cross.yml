# SPDX-License-Identifier: Apache-2.0
#
# Cross-compile sanity: we just need the binary to LINK for each target arch.
# Functional tests run on host CI; runtime smoke on real hardware is manual.
name: cross

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'cmake/toolchains/**'
      - 'CMakeLists.txt'
      - 'src/**'
      - 'include/**'
      - '.github/workflows/cross.yml'

jobs:
  cross:
    name: cross ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mipsel
            apt:    gcc-mipsel-linux-gnu g++-mipsel-linux-gnu
            prefix: mipsel-linux-gnu-
            toolchain: cmake/toolchains/mipsel-openwrt-musl.cmake
          - target: arm
            apt:    gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
            prefix: arm-linux-gnueabihf-
            toolchain: cmake/toolchains/arm-openwrt-musl.cmake
          - target: arm-eabi5
            apt:    ''
            musl_url: https://musl.cc/arm-linux-musleabi-cross.tgz
            prefix: arm-linux-musleabi-
            toolchain: cmake/toolchains/arm-eabi5-openwrt-musl.cmake

    steps:
      - uses: actions/checkout@v4

      - name: install base build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake
          if [ -n "${{ matrix.apt }}" ]; then
            sudo apt-get install -y ${{ matrix.apt }}
          fi

      - name: cache musl cross toolchain
        if: matrix.musl_url != ''
        id: musl-cache
        uses: actions/cache@v4
        with:
          path: /opt/cross
          key: musl-${{ matrix.target }}-${{ hashFiles('.github/workflows/cross.yml') }}

      - name: fetch musl cross toolchain
        if: matrix.musl_url != '' && steps.musl-cache.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt/cross
          curl -fsSL "${{ matrix.musl_url }}" | sudo tar -xz -C /opt/cross --strip-components=1

      - name: export musl toolchain to PATH
        if: matrix.musl_url != ''
        run: echo "/opt/cross/bin" >> "$GITHUB_PATH"

      - name: configure
        run: |
          cmake -B build-${{ matrix.target }} -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${{ matrix.toolchain }} \
            -DCFD_TOOLCHAIN_PREFIX=${{ matrix.prefix }} \
            -DCFD_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: build (cfd binary only; QUIC stubbed)
        run: cmake --build build-${{ matrix.target }} --target cfd -j

      - name: size report
        run: |
          ls -la build-${{ matrix.target }}/src/cfd
          ${{ matrix.prefix }}size build-${{ matrix.target }}/src/cfd || true

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cfd-${{ matrix.target }}-${{ github.sha }}
          path: build-${{ matrix.target }}/src/cfd
